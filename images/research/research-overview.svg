<svg xmlns="http://www.w3.org/2000/svg" width="640" height="640" viewBox="0 0 640 640" role="img" aria-label="研究の全体像：生成AIと統計手法による人口合成のパイプライン図">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7878a0"/>
    </marker>
  </defs>

  <rect width="640" height="640" fill="#0e0e16"/>

  <!-- タイトル -->
  <text x="320" y="34" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans',sans-serif" font-size="20" font-weight="700" fill="#e4e4f0">研究の全体像</text>
  <text x="320" y="58" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans',sans-serif" font-size="13" fill="#7878a0">生成AI × 統計手法による人口合成パイプライン</text>

  <!-- Box1: 入力 -->
  <rect x="40" y="78" width="560" height="92" rx="12" fill="#1c1c30" stroke="#2a2a40" stroke-width="1.5"/>
  <text x="64" y="110" font-family="'Noto Sans JP','Hiragino Sans',sans-serif" font-size="16" font-weight="700" fill="#4ecdc4">① 入力データ</text>
  <text x="64" y="136" font-family="'Noto Sans JP','Hiragino Sans',sans-serif" font-size="14" fill="#b9b9d0">・実活動データ（パーソントリップ調査 など）</text>
  <text x="64" y="158" font-family="'Noto Sans JP','Hiragino Sans',sans-serif" font-size="14" fill="#7878a0">・秘匿処理された人口マイクロデータ</text>

  <line x1="320" y1="172" x2="320" y2="196" stroke="#7878a0" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Box2: 人口合成エンジン（コア） -->
  <rect x="40" y="204" width="560" height="132" rx="12" fill="#191733" stroke="#8b7cf6" stroke-width="2"/>
  <text x="64" y="236" font-family="'Noto Sans JP','Hiragino Sans',sans-serif" font-size="16" font-weight="700" fill="#8b7cf6">② 人口合成エンジン（本研究の核）</text>
  <text x="64" y="262" font-family="'Noto Sans JP','Hiragino Sans',sans-serif" font-size="14" fill="#b9b9d0">・深層生成モデル（VAE / GAN / CTGAN / TVAE）</text>
  <text x="64" y="284" font-family="'Noto Sans JP','Hiragino Sans',sans-serif" font-size="14" fill="#b9b9d0">　× 統計手法（IPF）の融合</text>
  <text x="64" y="310" font-family="'Noto Sans JP','Hiragino Sans',sans-serif" font-size="13" fill="#e6c87a">→ ルールベースの画一性／深層学習の時間的整合性の欠如を克服</text>
  <text x="64" y="330" font-family="'Noto Sans JP','Hiragino Sans',sans-serif" font-size="13" fill="#7878a0">→ サンプリングゼロ問題にも対処</text>

  <line x1="320" y1="338" x2="320" y2="362" stroke="#7878a0" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Box3: 活動割り付け -->
  <rect x="40" y="370" width="560" height="92" rx="12" fill="#1c1c30" stroke="#2a2a40" stroke-width="1.5"/>
  <text x="64" y="402" font-family="'Noto Sans JP','Hiragino Sans',sans-serif" font-size="16" font-weight="700" fill="#4ecdc4">③ 活動割り付け</text>
  <text x="64" y="428" font-family="'Noto Sans JP','Hiragino Sans',sans-serif" font-size="14" fill="#b9b9d0">・合成した個人に「一日の活動スケジュール」を付与</text>
  <text x="64" y="450" font-family="'Noto Sans JP','Hiragino Sans',sans-serif" font-size="14" fill="#7878a0">・活動の時間的整合性を担保</text>

  <line x1="320" y1="464" x2="320" y2="488" stroke="#7878a0" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Box4: 出力 -->
  <rect x="40" y="496" width="560" height="112" rx="12" fill="#16241f" stroke="#4ecdc4" stroke-width="2"/>
  <text x="64" y="528" font-family="'Noto Sans JP','Hiragino Sans',sans-serif" font-size="16" font-weight="700" fill="#4ecdc4">④ 合成人口データ</text>
  <text x="64" y="554" font-family="'Noto Sans JP','Hiragino Sans',sans-serif" font-size="14" fill="#b9b9d0">・統計的に妥当 ＋ プライバシーを保護</text>
  <text x="64" y="576" font-family="'Noto Sans JP','Hiragino Sans',sans-serif" font-size="14" fill="#b9b9d0">・活用先：都市計画 / 交通予測 / 災害管理 / 疫学予測</text>
  <text x="64" y="598" font-family="'Noto Sans JP','Hiragino Sans',sans-serif" font-size="12" fill="#7878a0">※ 本図は研究内容にもとづく概念図です（実際の図に差し替え可）</text>
</svg>
